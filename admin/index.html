<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/png" href="../logo_bbm_circle.png" />
    <title>Адмін — вхід</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link rel="stylesheet" href="../assets/css/admin.css" />
  </head>
  <body data-admin-page="login">
    <nav class="nav nav--admin scrolled" aria-label="Адмін">
      <div class="admin-nav__inner">
        <div class="admin-nav__brand">
          <a class="nav__logo" href="../index.html">mozok.tilo.ruh</a>
        </div>
      </div>
    </nav>

    <main class="admin-page">
      <div id="authSection">
        <h1>Вхід адміністратора</h1>
        <!-- <p class="admin-muted">
          Після першого входу додай свій UUID у таблицю
          <code>admin_allowlist</code> у Supabase (SQL нижче на сторінці після входу якщо ще немає прав).
        </p> -->

        <div id="authError" class="admin-alert admin-alert--error admin-hide" role="alert"></div>
        <div id="authOk" class="admin-alert admin-alert--ok admin-hide" role="status"></div>

        <div class="admin-panel">
          <h2>Увійти</h2>
          <p class="admin-muted" style="margin-bottom: 14px">Для реєстрації вперше використай ці ж поля Email і Пароль.</p>
          <form id="signInForm" class="admin-grid admin-grid--2">
            <div class="admin-field admin-grid-span-2">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" autocomplete="username" required />
            </div>
            <div class="admin-field admin-grid-span-2">
              <label for="password">Пароль</label>
              <input id="password" name="password" type="password" autocomplete="current-password" required />
            </div>
            <div class="admin-actions">
              <button class="btn btn--primary btn--sm" type="submit">Увійти</button>
              <button class="btn btn--ghost btn--sm" type="button" id="registerBtn">Зареєструватись</button>
            </div>
          </form>
        </div>
      </div>

      <div id="blockedSection" class="admin-hide">
        <div class="admin-top">
          <h1 style="margin: 0">Немає прав</h1>
          <button type="button" class="btn btn--ghost btn--sm" id="signOutBlocked">Вийти</button>
        </div>
        <p class="admin-muted">
          Обліковий запис не у списку адміністраторів. Виконай у Supabase → SQL Editor (ідентифікатор користувача підставлено):
        </p>
        <pre
          style="
            font-size: 0.82rem;
            background: var(--cream-soft);
            border: 1px solid var(--cream-mid);
            border-radius: var(--radius-sm);
            padding: 16px;
            overflow: auto;
            line-height: 1.45;
          "
          id="allowlistSnippet"
        ></pre>
      </div>
    </main>

    <footer class="footer">
      <span>mozok.tilo.ruh — адмін</span>
      <a href="../index.html">Сайт</a>
    </footer>

    <script src="../assets/js/custom-select.js"></script>
    <script type="module" src="../assets/js/admin.js"></script>
  </body>
</html>
